<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Calon Pengantin | JALIN</title>
    <link rel="stylesheet" href="client.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="register-wrapper">
        <div class="container">
            <div class="form-container">
                <div class="logo-back" onclick="window.location.href='index.html'" style="cursor:pointer; font-weight:bold; color:#d14d72; margin-bottom: 20px; font-size: 24px;">
                    JALIN<span>.</span>
                </div>

                <h2>Daftar Pengantin 💍</h2>
                <p>Mulai perjalanan pernikahan impian Anda dengan memberdayakan sesama.</p>

                <form action="index.html" method="GET">
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" name="fullname" placeholder="Masukkan nama sesuai KTP" required>
                    </div>

                    <div class="form-group">
                        <label>Alamat Email</label>
                        <input type="email" name="email" placeholder="contoh@mail.com" required>
                    </div>

                    <div class="form-group">
                        <label>Kata Sandi</label>
                        <input type="password" name="password" placeholder="Minimal 8 karakter" required>
                    </div>

                    <div class="form-group">
                        <label>Rencana Bulan Pernikahan</label>
                        <select name="wedding-month">
                            <option value="">Pilih Bulan (Opsional)</option>
                            <option value="Januari">Januari</option>
                            <option value="Februari">Februari</option>
                            <option value="Maret">Maret</option>
                            </select>
                    </div>

                    <button type="submit" class="btn-client">Daftar Sekarang</button>
                </form>

                <div class="form-footer">
                    Sudah punya akun? <a href="login.html">Log In di sini</a>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
