<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Layanan | JALIN Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fffafb; }
        .sidebar-link:hover { background-color: #fff0f3; color: #d14d72; }
        /* Animasi muncul */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="text-gray-800">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-pink-50 hidden md:block">
            <div class="p-8">
                <div class="text-2xl font-bold text-[#d14d72] mb-10 cursor-pointer" onclick="window.location.href='index.html'">JALIN<span class="text-[#ffb7c5]">.</span></div>
                <nav class="space-y-2">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">Main Menu</p>
                    <a href="dashboard-vendor.html" class="flex items-center gap-3 p-3 rounded-lg text-sm text-gray-500 sidebar-link transition"><span>📊</span> Dashboard</a>
                    <a href="kelola-layanan.html" class="flex items-center gap-3 p-3 rounded-lg text-sm bg-[#fff0f3] text-[#d14d72] font-bold"><span>🛍️</span> Kelola Layanan</a>
                </nav>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-12">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Daftar Layanan Toko</h1>
                    <p class="text-xs text-gray-400 mt-1 italic">Tambahkan produk jasa kamu di sini.</p>
                </div>
                <button type="button" onclick="bukaModal()" class="bg-[#d14d72] text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-lg hover:bg-[#b03d5d] transition transform active:scale-95">
                    + Tambah Layanan
                </button>
            </div>

            <div id="container-layanan" class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-pink-50 flex gap-5">
                    <div class="w-24 h-24 bg-pink-100 rounded-2xl flex items-center justify-center text-3xl text-white">🍱</div>
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800">Paket Buffet Nusantara</h3>
                        <p class="text-xs text-[#d14d72] font-bold mt-1">Rp 85.000 / pax</p>
                        <div class="flex gap-2 mt-4">
                            <button class="text-[9px] bg-red-50 text-red-500 px-4 py-1.5 rounded-lg font-bold uppercase" onclick="this.parentElement.parentElement.parentElement.remove()">Hapus</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modalTambah" class="fixed inset-0 z-[3000] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="tutupModal()"></div>
        <div class="bg-white w-full max-w-md rounded-[3rem] relative z-10 p-10 shadow-2xl">
            <h3 class="text-xl font-bold text-gray-800 mb-6 text-center">Tambah Layanan Baru</h3>
            
            <form id="formLayanan" class="space-y-5 text-left">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Nama Jasa</label>
                    <input type="text" id="namaInput" required placeholder="Contoh: MUA Akad" class="w-full px-5 py-3.5 rounded-2xl border border-pink-50 bg-gray-50 outline-none focus:ring-2 focus:ring-pink-200 transition">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Harga (Rp)</label>
                    <input type="number" id="hargaInput" required placeholder="Contoh: 2500000" class="w-full px-5 py-3.5 rounded-2xl border border-pink-50 bg-gray-50 outline-none focus:ring-2 focus:ring-pink-200 transition">
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full bg-[#d14d72] text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-[#b03d5d] transition uppercase tracking-widest text-xs">
                        Simpan Sekarang
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Fungsi Buka Tutup Modal
        function bukaModal() {
            console.log("Tombol diklik!"); // Cek di console (F12) jika tidak muncul
            document.getElementById('modalTambah').classList.remove('hidden');
        }

        function tutupModal() {
            document.getElementById('modalTambah').classList.add('hidden');
        }

        // Fungsi Tambah Kartu
        document.getElementById('formLayanan').addEventListener('submit', function(e) {
            e.preventDefault();

            const nama = document.getElementById('namaInput').value;
            const harga = document.getElementById('hargaInput').value;
            const container = document.getElementById('container-layanan');

            // Format Rupiah
            const hargaRp = new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', minimumFractionDigits: 0
            }).format(harga);

            const card = `
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-pink-50 flex gap-5 animate-fadeIn">
                    <div class="w-24 h-24 bg-pink-100 rounded-2xl flex items-center justify-center text-3xl">📦</div>
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800">${nama}</h3>
                        <p class="text-xs text-[#d14d72] font-bold mt-1">${hargaRp}</p>
                        <div class="flex gap-2 mt-4">
                            <button class="text-[9px] bg-red-50 text-red-500 px-4 py-1.5 rounded-lg font-bold uppercase" onclick="this.parentElement.parentElement.parentElement.remove()">Hapus</button>
                        </div>
                    </div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', card);
            this.reset();
            tutupModal();
        });
    </script>
</body>
</html>
