<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profil | JALIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fffafb; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-white py-4 shadow-sm sticky top-0 z-50">
        <div class="w-[85%] mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold text-[#d14d72] cursor-pointer" onclick="window.location.href='index.html'">
                JALIN<span class="text-[#ffb7c5]">.</span>
            </div>
            <a href="dashboard.html" class="text-sm font-bold text-[#d14d72] hover:underline">← Kembali ke Dashboard</a>
        </div>
    </nav>

    <main class="w-[85%] mx-auto py-12">
        <div class="max-w-3xl mx-auto">
            
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-pink-50 overflow-hidden">
                <div class="bg-[#fff0f3] p-8 text-center border-b border-pink-100">
                    <h1 class="text-2xl font-bold text-[#d14d72]">Pengaturan Profil</h1>
                    <p class="text-gray-500 text-sm mt-1">Perbarui informasi akun Anda agar tetap akurat.</p>
                </div>

                <form id="editProfileForm" class="p-10 space-y-8">
                    
                    <div class="flex flex-col items-center">
                        <div class="relative group">
                            <div class="w-24 h-24 bg-[#fff0f3] rounded-full flex items-center justify-center text-3xl border-4 border-white shadow-md overflow-hidden">
                                <span id="profileIcon">👤</span>
                                <img id="previewImg" class="hidden w-full h-full object-cover" src="" alt="preview">
                            </div>
                            <label for="photo-upload" class="absolute bottom-0 right-0 bg-[#d14d72] text-white p-2 rounded-full cursor-pointer shadow-lg hover:bg-[#ffb7c5] transition">
                                📷
                            </label>
                            <input type="file" id="photo-upload" class="hidden" accept="image/*" onchange="previewFile()">
                        </div>
                        <p class="text-[10px] text-gray-400 mt-3 uppercase tracking-widest font-bold">Ganti Foto Profil</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1.5">
                            <label class="text-[11px] font-bold text-[#d14d72] uppercase tracking-wider ml-1">Nama Lengkap</label>
                            <input type="text" value="Dhidan" placeholder="Nama Anda" class="w-full px-5 py-3 rounded-xl border border-gray-100 outline-none focus:ring-2 focus:ring-pink-100 focus:border-[#ffb7c5] transition bg-gray-50/50">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[11px] font-bold text-[#d14d72] uppercase tracking-wider ml-1">Email</label>
                            <input type="email" value="dhidan@email.com" readonly class="w-full px-5 py-3 rounded-xl border border-gray-100 outline-none bg-gray-100 text-gray-400 cursor-not-allowed">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[11px] font-bold text-[#d14d72] uppercase tracking-wider ml-1">Nomor Telepon (WhatsApp)</label>
                            <input type="tel" placeholder="0812xxxxxxx" class="w-full px-5 py-3 rounded-xl border border-gray-100 outline-none focus:ring-2 focus:ring-pink-100 focus:border-[#ffb7c5] transition bg-gray-50/50">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[11px] font-bold text-[#d14d72] uppercase tracking-wider ml-1">Status</label>
                            <select disabled class="w-full px-5 py-3 rounded-xl border border-gray-100 bg-gray-100 text-gray-400 cursor-not-allowed appearance-none">
                                <option>Calon Pengantin</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-[#d14d72] uppercase tracking-wider ml-1">Alamat Lokasi Pernikahan</label>
                        <textarea rows="3" placeholder="Jl. Raya UPN Jatim No. 1..." class="w-full px-5 py-3 rounded-xl border border-gray-100 outline-none focus:ring-2 focus:ring-pink-100 focus:border-[#ffcad4] transition bg-gray-50/50 resize-none"></textarea>
                    </div>

                    <hr class="border-pink-50">

                    <div class="flex flex-col md:flex-row gap-4 pt-4">
                        <button type="submit" class="flex-1 bg-[#d14d72] text-white py-4 rounded-2xl font-bold shadow-lg shadow-pink-100 hover:bg-[#b03d5d] transition transform active:scale-95 uppercase tracking-widest text-sm">
                            Simpan Perubahan
                        </button>
                        <button type="button" onclick="window.location.href='dashboard.html'" class="flex-1 bg-white text-gray-400 py-4 rounded-2xl font-bold border border-gray-100 hover:bg-gray-50 transition uppercase tracking-widest text-sm">
                            Batal
                        </button>
                    </div>

                </form>
            </div>
            
            <p class="text-center mt-8 text-xs text-gray-400">Terakhir diperbarui: 18 Maret 2026</p>
        </div>
    </main>

    <script>
        // Fungsi pratinjau foto profil
        function previewFile() {
            const preview = document.getElementById('previewImg');
            const icon = document.getElementById('profileIcon');
            const file = document.getElementById('photo-upload').files[0];
            const reader = new FileReader();

            reader.addEventListener("load", function () {
                preview.src = reader.result;
                preview.classList.remove('hidden');
                icon.classList.add('hidden');
            }, false);

            if (file) {
                reader.readAsDataURL(file);
            }
        }

        // Simulasi simpan data
        document.getElementById('editProfileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Perubahan profil berhasil disimpan!');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
