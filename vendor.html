<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JALIN | Katalog Vendor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fffafb; color: #333; }
        .vendor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; margin-top: 20px; }
        .vendor-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.03); border: 1px solid #fce7eb; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .vendor-card:hover { transform: translateY(-12px); box-shadow: 0 25px 30px rgba(209, 77, 114, 0.12); }
        .vendor-img { position: relative; height: 240px; overflow: hidden; }
        .vendor-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .vendor-card:hover .vendor-img img { transform: scale(1.1); }
        .price-tag { color: #d14d72; font-weight: 700; font-size: 18px; }
        #vendorModal.hidden { display: none; }
        #vendorModal:not(.hidden) { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="sticky top-0 z-[1000] bg-white/90 backdrop-blur-md py-4 shadow-sm border-b border-pink-50 text-left">
        <div class="w-[85%] mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold text-[#d14d72] cursor-pointer" onclick="window.location.href='index.html'">JALIN<span class="text-[#ffb7c5]">.</span></div>
            <div id="user-nav-container"></div>
        </div>
    </nav>

    <header class="py-20 text-center relative overflow-hidden text-center">
        <div class="container mx-auto px-4 relative z-10">
            <p class="text-[#ffb7c5] font-bold uppercase tracking-[0.4em] text-[10px] mb-4">Official Partners</p>
            <h2 class="text-4xl md:text-5xl font-extrabold text-gray-800 leading-tight">Temukan Vendor <br><span class="text-[#d14d72]">Impian Anda</span></h2>
        </div>
    </header>

    <section class="container mx-auto px-4 w-[85%] pb-32">
        <div id="vendor-grid-container" class="vendor-grid"></div>
    </section>

    <div id="vendorModal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white w-full max-w-4xl rounded-[3rem] relative z-10 overflow-hidden shadow-2xl flex flex-col md:flex-row max-h-[90vh] text-left">
            <div class="md:w-1/2 h-64 md:h-auto overflow-hidden">
                <img id="modalImg" src="" class="w-full h-full object-cover">
            </div>
            <div class="md:w-1/2 p-10 md:p-14 overflow-y-auto">
                <button onclick="closeModal()" class="absolute top-8 right-10 text-3xl text-gray-300 hover:text-[#d14d72]">&times;</button>
                <p id="modalCat" class="text-[10px] font-bold text-[#ffcad4] uppercase tracking-widest mb-2">Layanan Vendor</p>
                <h2 id="modalTitle" class="text-3xl font-bold text-gray-800 mb-2 leading-tight"></h2>
                
                <div class="space-y-4 my-8">
                    <h4 class="font-bold text-gray-700 text-xs uppercase tracking-widest">Deskripsi Layanan:</h4>
                    <p id="modalDesc" class="text-sm text-gray-500 leading-relaxed italic"></p>
                </div>

                <div class="pt-8 border-t border-gray-100">
                    <div class="flex items-center justify-between mb-8">
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider text-left">Harga JALIN</p>
                            <p id="modalPrice" class="text-2xl font-bold text-[#d14d72] text-left"></p>
                        </div>
                    </div>
                    
                    <div class="flex flex-col sm:flex-row gap-4">
                        <button id="btnHubungi" class="flex-1 bg-green-500 text-white px-6 py-4 rounded-2xl font-bold shadow-lg shadow-green-100 hover:bg-green-600 transition flex items-center justify-center gap-2 text-sm uppercase tracking-wider">
                            <span>💬</span> Hubungi Vendor
                        </button>
                        <button class="flex-1 bg-[#d14d72] text-white px-6 py-4 rounded-2xl font-bold shadow-lg shadow-pink-100 hover:bg-[#b03d5d] transition text-sm uppercase tracking-wider">
                            Booking
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const staticVendors = [
            { nama: 'Glow Academy', cat: 'MUA Freelance', harga: 2500000, gambar: 'https://images.unsplash.com/photo-1486304828099-22160101da67?auto=format&fit=crop&w=600&q=80', desc: 'MUA profesional bersertifikat untuk berbagai acara pernikahan.' },
            { nama: 'Rustic Bamboo', cat: 'Dekorasi', harga: 15000000, gambar: 'https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=600&q=80', desc: 'Dekorasi tema rustic yang hangat dan ramah lingkungan.' }
        ];

        window.onload = function() {
            renderKatalog();
            const user = localStorage.getItem('userJalin');
            if(user) document.getElementById('user-nav-container').innerHTML = `<span class="bg-[#ffb7c5] px-6 py-2.5 rounded-full text-white font-bold text-xs uppercase tracking-widest shadow-md">👤 ${user.toUpperCase()}</span>`;
        };

        function renderKatalog() {
            const grid = document.getElementById('vendor-grid-container');
            const dynamicData = JSON.parse(localStorage.getItem('jalin_services')) || [];
            const allData = [...staticVendors, ...dynamicData];
            
            grid.innerHTML = '';
            allData.forEach((item) => {
                const hargaFormat = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(item.harga);
                const itemData = btoa(JSON.stringify(item));

                grid.insertAdjacentHTML('beforeend', `
                    <div class="vendor-card">
                        <div class="vendor-img"><img src="${item.gambar}"></div>
                        <div class="p-8 text-left">
                            <p class="text-[10px] font-bold text-[#ffcad4] uppercase tracking-widest mb-1">${item.cat || 'Vendor Partner'}</p>
                            <h3 class="text-xl font-bold text-gray-800">${item.nama}</h3>
                            <div class="flex justify-between items-center mt-8 pt-5 border-t border-gray-50">
                                <span class="price-tag">${hargaFormat}</span>
                                <button onclick="openModal('${itemData}')" class="bg-[#fff0f3] text-[#d14d72] px-5 py-2.5 rounded-xl text-xs font-bold border border-pink-100 hover:bg-[#d14d72] hover:text-white transition">Lihat</button>
                            </div>
                        </div>
                    </div>`);
            });
        }

        function openModal(encodedData) {
            const item = JSON.parse(atob(encodedData));
            const hargaFormat = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(item.harga);

            document.getElementById('modalTitle').innerText = item.nama;
            document.getElementById('modalImg').src = item.gambar;
            document.getElementById('modalPrice').innerText = hargaFormat;
            document.getElementById('modalDesc').innerText = item.deskripsi || item.desc || "Layanan unggulan dari mitra JALIN.";
            document.getElementById('modalCat').innerText = item.cat || "Layanan Vendor";

            // LOGIKA WHATSAPP
            const btnHubungi = document.getElementById('btnHubungi');
            btnHubungi.onclick = function() {
                const nomerWA = "6285808330777"; // Masukkan nomer kamu di sini untuk tes
                const pesan = `Halo JALIN! Saya tertarik dengan layanan *${item.nama}* seharga *${hargaFormat}*. Apakah masih tersedia?`;
                window.open(`https://wa.me/${nomerWA}?text=${encodeURIComponent(pesan)}`, '_blank');
            };

            document.getElementById('vendorModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('vendorModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
