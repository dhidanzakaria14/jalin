<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JALIN | Kelola Kategori</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fffafb; }
        .card-custom { background: white; border-radius: 2.5rem; border: 1px solid #fce7eb; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
    </style>
</head>
<body class="text-gray-800 p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10 text-left">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Master Kategori</h1>
                <p class="text-sm text-gray-400 mt-1 italic">Kelola kategori layanan untuk JALIN Partner</p>
            </div>
            <a href="dashboard-vendor.html" class="text-sm font-bold text-[#d14d72] hover:underline flex items-center gap-2">
                <span>←</span> Dashboard
            </a>
        </header>

        <div class="card-custom p-8 mb-10">
            <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-4 ml-1">Tambah Kategori Baru</h3>
            <form class="flex flex-col md:flex-row gap-4">
                <input type="text" placeholder="Misal: Wedding Organizer, Catering..." class="flex-1 px-6 py-4 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-pink-100 transition text-sm">
                <button type="button" class="bg-[#d14d72] text-white px-10 py-4 rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-lg shadow-pink-100 hover:bg-[#b03d5d] transition">
                    Simpan
                </button>
            </form>
        </div>

        <div class="card-custom overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-pink-50/30">
                    <tr class="text-[10px] font-bold uppercase text-gray-400 tracking-widest">
                        <th class="p-8">ID</th>
                        <th class="p-8">Nama Kategori</th>
                        <th class="p-8 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody class="text-sm divide-y divide-pink-50">
                    <tr class="hover:bg-pink-50/10 transition">
                        <td class="p-8 font-mono text-gray-400">#1</td>
                        <td class="p-8 font-bold text-gray-700">MUA & Hairdo</td>
                        <td class="p-8 text-center flex justify-center gap-4">
                            <button onclick="openEditModal()" class="text-blue-500 font-bold hover:underline uppercase text-[10px] tracking-tighter">Edit</button>
                            <button class="text-red-400 font-bold hover:underline uppercase text-[10px] tracking-tighter">Hapus</button>
                        </td>
                    </tr>
                    <tr class="hover:bg-pink-50/10 transition">
                        <td class="p-8 font-mono text-gray-400">#2</td>
                        <td class="p-8 font-bold text-gray-700">Dekorasi Pelaminan</td>
                        <td class="p-8 text-center flex justify-center gap-4">
                            <button class="text-blue-500 font-bold hover:underline uppercase text-[10px] tracking-tighter">Edit</button>
                            <button class="text-red-400 font-bold hover:underline uppercase text-[10px] tracking-tighter">Hapus</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <footer class="mt-12 text-center">
            <p class="text-[9px] text-gray-300 font-bold uppercase tracking-[0.3em]">JALIN System Management v1.0</p>
        </footer>
    </div>

    <div id="modalEdit" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl animate-fadeIn">
            <h3 class="text-xl font-bold text-gray-800 mb-6 italic">Edit Kategori</h3>
            <div class="space-y-4">
                <div class="text-left">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1 text-left">Nama Kategori</label>
                    <input type="text" value="MUA & Hairdo" class="w-full mt-2 px-6 py-4 rounded-2xl border bg-gray-50 outline-none text-sm">
                </div>
                <button class="w-full bg-blue-500 text-white py-4 rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-lg mt-4">Simpan Perubahan</button>
                <button onclick="closeEditModal()" class="w-full text-gray-400 font-bold uppercase text-[10px] mt-2">Batal</button>
            </div>
        </div>
    </div>

    <script>
        function openEditModal() {
            document.getElementById('modalEdit').classList.remove('hidden');
        }
        function closeEditModal() {
            document.getElementById('modalEdit').classList.add('hidden');
        }
    </script>
</body>
</html>
