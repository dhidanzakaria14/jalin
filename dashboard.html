<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Mitra | JALIN</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-dash">
    <div class="dash-wrapper">
        <aside class="dash-sidebar">
            <div class="logo">JALIN<span>.</span></div>
            <nav class="side-menu">
                <a href="#" class="active">📊 Dashboard</a>
                <a href="#">📅 Jadwal Projek</a>
                <a href="#">💰 Keuangan</a>
                <hr>
                <a href="index.html">🏠 Beranda Web</a>
            </nav>
        </aside>

        <main class="dash-content">
            <header class="dash-header">
                <h2>Selamat Datang, Mitra JALIN</h2>
                <div class="badge-status">Aktif</div>
            </header>

            <div class="grid-3">
                <div class="stat-box">
                    <span>Income</span>
                    <h3>Rp 15.000.000</h3>
                </div>
                <div class="stat-box">
                    <span>Projek Selesai</span>
                    <h3>24</h3>
                </div>
                <div class="stat-box">
                    <span>Kontribusi SDG</span>
                    <h3>High</h3>
                </div>
            </div>

            <section class="table-container">
                <h3>Antrean Pekerjaan</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Klien</th>
                            <th>Layanan</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Dinda & Eko</td>
                            <td>Catering UMKM</td>
                            <td><span class="st st-waiting">Menunggu</span></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
</body>
</html>
