<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JALIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-[#fffafb] min-h-screen flex items-center justify-center p-6 text-gray-800">

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="text-3xl font-bold text-[#d14d72] cursor-pointer inline-block" onclick="window.location.href='index.html'">
                JALIN<span class="text-[#ffb7c5]">.</span>
            </div>
            <p class="text-gray-500 text-sm mt-2">Wujudkan momen indah sekaligus berbagi dampak sosial.</p>
        </div>

        <div class="bg-white p-8 rounded-[2rem] shadow-2xl shadow-pink-100/50 border border-pink-50">
            <h2 class="text-xl font-bold text-gray-800 mb-6 text-center">Selamat Datang Kembali</h2>
            
            <form id="loginForm" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-[11px] font-bold text-[#d14d72] uppercase tracking-wider ml-1">Email</label>
                    <input type="email" id="email" required placeholder="Gunakan kata 'vendor' untuk tes" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-100 outline-none focus:ring-2 focus:ring-pink-100 focus:border-[#ffb7c5] transition placeholder:text-gray-300 text-sm">
                </div>

                <div id="phoneArea" class="space-y-1.5">
                    <label class="text-[11px] font-bold text-[#d14d72] uppercase tracking-wider ml-1">Nomor WhatsApp Vendor</label>
                    <input type="number" id="phone" placeholder="Contoh: 628123456789" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-100 outline-none focus:ring-2 focus:ring-pink-100 focus:border-[#ffb7c5] transition placeholder:text-gray-300 text-sm">
                    <p class="text-[9px] text-gray-400 ml-1 italic">*Wajib diisi jika Anda mendaftar sebagai Vendor.</p>
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between items-center ml-1">
                        <label class="text-[11px] font-bold text-[#d14d72] uppercase tracking-wider">Password</label>
                        <a href="#" class="text-[11px] font-bold text-pink-300 hover:text-[#d14d72] transition">Lupa Password?</a>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-100 outline-none focus:ring-2 focus:ring-pink-100 focus:border-[#ffb7c5] transition placeholder:text-gray-300">
                </div>

                <button type="submit" 
                    class="w-full bg-[#d14d72] text-white py-4 rounded-xl font-bold shadow-lg shadow-pink-200 hover:bg-[#b03d5d] transform active:scale-95 transition duration-300 mt-4 uppercase tracking-widest text-sm">
                    Masuk Sekarang
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase tracking-[0.2em]"><span class="bg-white px-4 text-gray-400">Atau masuk dengan</span></div>
            </div>

            <button type="button" onclick="loginGoogleSimulasi(event)" class="w-full border border-gray-100 py-3 rounded-xl flex items-center justify-center gap-3 hover:bg-gray-50 transition text-sm font-semibold text-gray-600 active:scale-95">
                <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5" alt="Google">
                Google Akun
            </button>
        </div>

        <p class="text-center mt-8 text-sm text-gray-500">
            Belum punya akun? 
            <a href="register.html" class="text-[#d14d72] font-bold hover:underline transition">Daftar di sini</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.toLowerCase();
            const phone = document.getElementById('phone').value;
            const userDisplay = email.split('@')[0]; 
            
            // Simpan Nama dan Nomor Telepon ke LocalStorage
            localStorage.setItem('userJalin', userDisplay);
            localStorage.setItem('userPhoneJalin', phone); // <--- INI DISIMPAN
            
            if (email.includes('vendor')) {
                localStorage.setItem('userRole', 'Vendor');
                // Beri peringatan jika vendor tidak isi nomor HP
                if(!phone) {
                    alert("Vendor wajib mengisi nomor WhatsApp untuk katalog!");
                    return;
                }
                window.location.href = 'dashboard-vendor.html';
            } else if (email.includes('student') || email.includes('mahasiswa')) {
                localStorage.setItem('userRole', 'Freelance');
                window.location.href = 'dashboard-vendor.html';
            } else {
                localStorage.setItem('userRole', 'Pengantin');
                window.location.href = 'index.html';
            }
        });

        function loginGoogleSimulasi(event) {
            const btn = event.currentTarget;
            btn.innerHTML = `<span class="text-xs italic">Menghubungkan...</span>`;
            
            setTimeout(() => {
                const userGoogle = "DHIDAN"; 
                localStorage.setItem('userJalin', userGoogle);
                localStorage.setItem('userPhoneJalin', '628123456789'); // Dummy phone untuk Google Login
                localStorage.setItem('userRole', 'Pengantin');
                window.location.href = 'index.html';
            }, 1000); 
        }
    </script>
</body>
</html>
